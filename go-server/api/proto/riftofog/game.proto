syntax = "proto3";

package riftofog;

option go_package = "go-server/api/proto/riftofog;riftofog";

// 行为请求：网关或 gRPC 调用 Combat/Event/Resource 时传入。
message ActionRequest {
  string action_key   = 1;  // 行为 key
  int32  str          = 2;
  int32  int_val      = 3;
  int32  lck          = 4;
  int32  stealth      = 5;
  int32  hp           = 6;
  int32  ap           = 7;
  string status       = 8;  // 当前状态，如"中毒 燃烧"
  string enemy_type   = 9;  // 仅 Combat 用：patrol/guard/swarm
  string room_content = 10; // 仅 Event/Resource 用
}

// 行为结果：HP/AP 变化已在服务端按「不低于 0」截断。
message ActionResult {
  bool   success     = 1;
  string result_text = 2;  // 展示给玩家的描述
  int32  hp_delta    = 3;
  int32  ap_delta    = 4;
  string new_status  = 5;  // 新增状态
  string clear_status = 6; // 清除状态
  string reward      = 7;  // 获得的物品/信息
}

service CombatService {
  rpc ExecuteAction(ActionRequest) returns (ActionResult);
}

service EventService {
  rpc ExecuteAction(ActionRequest) returns (ActionResult);
}

service ResourceService {
  rpc ExecuteAction(ActionRequest) returns (ActionResult);
}
