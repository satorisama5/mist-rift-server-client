syntax = "proto3";

package riftofog;

option go_package = "go-server/api/proto/riftofog;riftofog";

// UnityRequest 与 Unity 端发送的 JSON 一一对应（WebSocket 网关收包）。
// 来源：RiftOfFogSceneContext.GetCurrentContext() + 自然语言/行为。
message UnityRequest {
  string   room_type       = 1;   // Combat / Event / Resource / PathChoice
  int32    node_x          = 2;
  int32    node_y          = 3;
  repeated string path_hints = 4; // D 类路径选择时的语义提示
  int32    hp              = 5;
  int32    ap              = 6;
  int32    str             = 7;
  int32    int_val         = 8;   // 对应 Unity Base.INT
  int32    lck             = 9;
  int32    stealth         = 10;
  string   status          = 11;
  string   current_goal    = 12;
  repeated string recent_decisions = 13;
  string   message         = 14;  // 自然语言指令
  string   action_key      = 15;  // 行为 key，如 strong_attack, lure

  string   session_id      = 16;  // 会话ID，必须有
  string   type            = 17;  // "command" 或 "decision_record"
  repeated string available_actions = 18;  // 当前房间可选行为列表
  string   enemy_type      = 19;  // 仅 Combat：patrol/guard/swarm
  string   room_content    = 20;  // 仅 Event/Resource：npc/device/inscription、chest_*/merchant/spring
}

// ServerResponse 与服务端返回给 Unity 的 JSON 一一对应（WebSocket 网关发包）。
message ServerResponse {
  string session_id   = 1;
  string type         = 2;  // action_result / llm_suggestion
  string service      = 3;  // Combat / Event / Resource
  string action       = 4;  // 实际执行的行为
  string result       = 5;  // 行为结果描述
  string ai_reasoning = 6;  // AI决策理由，展示给玩家
  string suggestion   = 7;  // LLM推荐的最优行为
  StateChanges state_changes = 8;  // 状态变化，Unity 收到后更新 PlayerStats
}

// 状态变化，Unity 收到后更新 PlayerStats
message StateChanges {
  int32  hp_delta     = 1;  // HP变化，负数=受伤
  int32  ap_delta     = 2;  // AP变化
  string new_status   = 3;  // 新增状态，如"中毒"
  string clear_status = 4;  // 清除状态
}
